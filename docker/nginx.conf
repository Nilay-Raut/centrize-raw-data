server {
    listen 80;
    server_name _;

    # ── Angular SPA ───────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # All non-API, non-asset routes go to index.html (Angular router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy → cdp-api container ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://cdp-api:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Large CSV uploads need time
        client_max_body_size 60M;
        proxy_read_timeout   120s;
        proxy_send_timeout   120s;
    }

    # ── Embed Widget JS files ─────────────────────────────────────────────────
    # 3rd party platforms load: <script src="https://yourdomain.com/widget/main.js">
    # Must allow cross-origin (CORS) so external sites can load the script.
    location /widget/ {
        alias /usr/share/nginx/html/widget/;

        # Allow any external platform to load the widget JS
        add_header Access-Control-Allow-Origin  "*"             always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"  always;

        # Widget JS changes rarely — cache for 1 hour (short because no hash in filename)
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # ── Admin portal static assets (hashed filenames — cache aggressively) ───
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security headers (admin portal only — not applied to /widget/) ────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "no-referrer"  always;
}
