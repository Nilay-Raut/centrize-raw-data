# nginx/admin.conf — Production config for the Angular admin portal
#
# Responsibilities:
#   1. Serve the Angular SPA — all unknown paths fall back to index.html
#      (required for client-side routing to work on hard refresh/direct URL)
#   2. Aggressive cache headers for hashed assets (JS/CSS/fonts)
#   3. Proxy /api/* to the Express backend (port 3000)
#   4. SSL termination (provide cert paths via environment or update below)
#
# Deploy:
#   sudo cp nginx/admin.conf /etc/nginx/sites-available/cdp-admin
#   sudo ln -s /etc/nginx/sites-available/cdp-admin /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name admin.yourapp.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.yourapp.com;

    # ── SSL certificates ──────────────────────────────────────────────────────
    # Replace with your actual cert paths (Let's Encrypt, ACM, etc.)
    ssl_certificate     /etc/ssl/certs/admin.yourapp.com.crt;
    ssl_certificate_key /etc/ssl/private/admin.yourapp.com.key;

    # Modern TLS config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ── Angular SPA root ──────────────────────────────────────────────────────
    root /var/www/admin;
    index index.html;

    # All navigation routes fall back to index.html
    # (Angular Router handles the path client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Aggressively cache hashed assets ─────────────────────────────────────
    # Angular build output has content hashes in filenames (e.g. main.4a7f1bc2.js)
    # These can be cached indefinitely — a new deploy produces new filenames.
    location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API proxy — forward /api/* to Express backend ─────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for streaming responses (CSV export uses chunked transfer)
        proxy_buffering    off;
        proxy_cache        off;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Longer timeout for large CSV exports
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Deny access to hidden files ───────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;
}
