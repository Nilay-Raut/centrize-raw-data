services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cdp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-campaign_data}
      POSTGRES_USER:     ${POSTGRES_USER:-cdp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cdp-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdp} -d ${POSTGRES_DB:-campaign_data}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cdp-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - cdp-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Run DB Migrations (once, then exits) ──────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: builder
    container_name: cdp-migrate
    command: npx ts-node src/db/migrate.ts
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cdp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-campaign_data}
      NODE_ENV: production
    networks:
      - cdp-internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API Server ────────────────────────────────────────────────────────────────
  cdp-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: api
    container_name: cdp-api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV:     production
      PORT:         3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-cdp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-campaign_data}
      REDIS_URL:    redis://redis:6379
    networks:
      - cdp-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── BullMQ Worker ─────────────────────────────────────────────────────────────
  cdp-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: worker
    container_name: cdp-worker
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV:           production
      DATABASE_URL:       postgresql://${POSTGRES_USER:-cdp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-campaign_data}
      REDIS_URL:          redis://redis:6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    networks:
      - cdp-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Frontend: Angular static files served by Nginx ───────────────────────────
  # Nginx also proxies /api/* → cdp-api:3000
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: cdp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - cdp-internal
    depends_on:
      cdp-api:
        condition: service_healthy

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ── Networks (internal only — nothing exposed except port 80) ─────────────────
networks:
  cdp-internal:
    driver: bridge
