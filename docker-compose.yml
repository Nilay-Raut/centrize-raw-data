version: '3.9'

# Local development only — do NOT use in production.
# Start with: docker compose up -d
# Stop with:  docker compose down
# Reset data: docker compose down -v

services:
  postgres:
    image: postgres:15-alpine
    container_name: cdp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campaign_data
      POSTGRES_USER: cdp_user
      POSTGRES_PASSWORD: cdp_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cdp_user -d campaign_data']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cdp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
